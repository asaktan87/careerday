```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Day 2026</title>

<style>
:root{
    --straumann-blue:#195AFA;
    --straumann-sand:#B98C3C;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:url('bg1.png') center center / cover no-repeat;
    position:relative;
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.title{
    color:white;
    font-size:clamp(34px,5vw,64px);
    font-weight:700;
    letter-spacing:.03em;
    margin-bottom:10px;
}

.date{
    color:var(--straumann-sand);
    font-size:clamp(16px,2vw,24px);
    font-weight:600;
    margin-bottom:50px;
}

.countdown{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.time-box{
    min-width:140px;
    padding:25px 20px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    backdrop-filter:blur(12px);
}

.number{
    font-size:clamp(42px,6vw,72px);
    font-weight:700;
    color:white;
    line-height:1;
}

.label{
    margin-top:10px;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:.2em;
    color:var(--straumann-sand);
}

.footer{
    margin-top:60px;
    color:white;
    opacity:.9;
    font-size:18px;
    max-width:700px;
}

.finished{
    color:var(--straumann-sand);
    font-size:clamp(34px,5vw,60px);
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        Career Day 2026
    </div>

    <div class="date">
        15 June 2026
    </div>

    <div id="countdown" class="countdown">

        <div class="time-box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>

        <div class="time-box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>

        <div class="time-box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>

        <div class="time-box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>

    </div>

    <div class="footer">
        Explore opportunities. Build connections. Shape your future.
    </div>

</div>

<script>

const targetDate =
new Date("2026-06-15T23:59:59");

function updateCountdown(){

    const now = new Date();

    const difference =
    targetDate - now;

    if(difference <= 0){

        document.querySelector(".container").innerHTML = `
            <div class="finished">
                🎉 Career Day 2026 is here!
            </div>
        `;

        return;
    }

    const days =
    Math.floor(difference / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor(
        (difference %
        (1000 * 60 * 60 * 24))
        /
        (1000 * 60 * 60)
    );

    const minutes =
    Math.floor(
        (difference %
        (1000 * 60 * 60))
        /
        (1000 * 60)
    );

    const seconds =
    Math.floor(
        (difference %
        (1000 * 60))
        /
        1000
    );

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
```
